<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 Header</title>

<style>
body{
margin:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */

.nm-header{
position:relative;
width:min(100%, 1900px);
aspect-ratio:2400 / 600;
margin:auto;
overflow:hidden;
}

/* BAKED HEADER IMAGE */

.nm-banner{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

/* HOME / PLAN / GUIDE OVERLAY */

.nm-home-nav{
position:absolute;
left:50%;
bottom:10%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:50px;
z-index:2;
}

.nm-home-nav a{
text-decoration:none;
font-size:clamp(16px, 1.6vw, 24px);
font-weight:500;
letter-spacing:1px;
color:#EE8537;
line-height:1;
}

/* OPTIONAL HOVER */

.nm-home-nav a:hover{
opacity:0.85;
}

/* SMALLER SCREENS */

@media (max-width: 900px){
.nm-home-nav{
gap:30px;
bottom:8%;
}

.nm-home-nav a{
font-size:clamp(12px, 2.8vw, 18px);
letter-spacing:0.5px;
}
}

@media (max-width: 520px){
.nm-home-nav{
gap:18px;
bottom:6.5%;
}

.nm-home-nav a{
font-size:clamp(10px, 3.2vw, 14px);
}
}
</style>
</head>

<body>

<header class="nm-header">

<img src="assets/images/header-background.png" class="nm-banner" alt="NM26 Header">

<nav class="nm-home-nav">
<a href="#">HOME</a>
<a href="#">PLAN</a>
<a href="#">GUIDE</a>
</nav>

</header>

</body>
</html>
