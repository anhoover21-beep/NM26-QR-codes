<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 Header</title>

<style>

body{
margin:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER FRAME */

.nm-header{
position:relative;
background:#6f2f3b;
border:6px solid #e25a00;
padding:35px;
max-width:1900px;
margin:auto;
overflow:hidden;
}

/* DIAMOND PATTERN */

.pattern{
position:absolute;
pointer-events:none;
}

.pattern-top{
top:8px;
left:40px;
right:40px;
display:flex;
justify-content:space-between;
}

.pattern-bottom{
bottom:8px;
left:40px;
right:40px;
display:flex;
justify-content:space-between;
}

.pattern-left{
left:8px;
top:40px;
bottom:40px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.pattern-right{
right:8px;
top:40px;
bottom:40px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.diamond{
width:18px;
height:18px;
background:#e25a00;
transform:rotate(45deg);
}

/* INNER PANEL */

.nm-panel{
background:#e98636;
}

/* TOP AREA */

.nm-top{
display:flex;
align-items:center;
justify-content:space-between;
padding:30px 30px;
}

/* LOGO */

.nm-logo{
display:flex;
align-items:center;
gap:18px;
}

.nm-state-wrap{
position:relative;
width:90px;
}

.nm-state{
width:100%;
}

.nm-state-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-55%);
font-size:40px;
font-weight:900;
color:white;
}

.nm-number{
font-size:50px;
font-weight:900;
color:#e25a00;
}

/* TOP NAV */

.nm-main{
display:flex;
align-items:center;
gap:30px;
}

.nm-main a{
text-decoration:none;
font-size:60px;
font-weight:900;
color:#6f2f3b;
}

.divider{
font-size:36px;
color:#6f2f3b;
}

/* BOTTOM BAR */

.nm-bottom{
background:#6f2f3b;
padding:14px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LEFT NAV */

.nm-left{
display:flex;
gap:40px;
}

.nm-left a{
text-decoration:none;
font-size:32px;
color:#f08a35;
}

/* RIGHT TEXT */

.nm-right{
font-size:56px;
font-weight:900;
color:#e25a00;
}

</style>
</head>

<body>

<header class="nm-header">

<!-- DIAMOND FRAME -->

<div class="pattern pattern-top">
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div>
</div>

<div class="pattern pattern-bottom">
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div>
</div>

<div class="pattern pattern-left">
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>
</div>

<div class="pattern pattern-right">
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>
</div>

<!-- MAIN PANEL -->

<div class="nm-panel">

<div class="nm-top">

<div class="nm-logo">

<div class="nm-state-wrap">
<img src="assets/images/new-mexico.png" class="nm-state">
<span class="nm-state-text">NM</span>
</div>

<span class="nm-number">26</span>

</div>

<nav class="nm-main">
<a href="#">HISTORY</a>
<span class="divider">✣</span>
<a href="#">MYSTERY</a>
<span class="divider">✣</span>
<a href="#">MIRACLES</a>
</nav>

</div>


<div class="nm-bottom">

<nav class="nm-left">
<a href="#">HOME</a>
<a href="#">PLAN</a>
<a href="#">GUIDE</a>
</nav>

<div class="nm-right">
VACATION 2026
</div>

</div>

</div>

</header>

</body>
</html>
