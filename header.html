<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NM26 Header</title>

  <style>
    :root {
      --bg-page: #000;
      --orange: #e15700;
      --orange-soft: #f08a35;
      --maroon: #6d2d39;
      --black: #111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg-page);
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-header {
      width: min(100%, 2048px);
      margin: 0 auto;
      position: relative;
      aspect-ratio: 2400 / 600;
      background-image: url("assets/images/header_background.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
      overflow: hidden;
    }

    .header-overlay {
      position: absolute;
      inset: 0;
    }

    .nm-logo {
      position: absolute;
      left: 10.8%;
      top: 23.5%;
      display: flex;
      align-items: center;
      gap: 1vw;
      line-height: 1;
    }

    .nm-logo-box {
      border: 0.18vw solid var(--black);
      border-radius: 0.35vw;
      padding: 1.4vw 1vw 1vw;
      transform: skew(-2deg);
    }

    .nm-logo-box span {
      display: block;
      font-size: clamp(28px, 4vw, 92px);
      font-weight: 900;
      color: var(--maroon);
      transform: skew(2deg);
    }

    .nm-logo-number {
      font-size: clamp(32px, 5.3vw, 118px);
      font-weight: 900;
      color: var(--orange);
    }

    .header-top-nav {
      position: absolute;
      top: 31%;
      left: 49%;
      transform: translateX(-8%);
      display: flex;
      align-items: center;
      gap: 1.8vw;
      white-space: nowrap;
    }

    .header-top-nav a,
    .header-top-nav span {
      text-decoration: none;
      font-size: clamp(18px, 3.2vw, 72px);
      font-weight: 900;
      color: var(--maroon);
      line-height: 1;
    }

    .header-top-nav .divider {
      font-size: clamp(18px, 2.1vw, 46px);
      font-weight: 700;
      color: var(--maroon);
      transform: translateY(2%);
    }

    .header-bottom-left {
      position: absolute;
      left: 12.3%;
      bottom: 5.8%;
      display: flex;
      align-items: center;
      gap: 3.8vw;
      white-space: nowrap;
    }

    .header-bottom-left a {
      text-decoration: none;
      font-size: clamp(16px, 2vw, 46px);
      font-weight: 500;
      color: var(--orange-soft);
      letter-spacing: 0.02em;
    }

    .header-bottom-right {
      position: absolute;
      right: 10.6%;
      bottom: 4.5%;
      text-decoration: none;
      font-size: clamp(18px, 2.6vw, 58px);
      font-weight: 900;
      color: var(--orange);
      white-space: nowrap;
      line-height: 1;
    }

    .site-header a:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 4px;
    }

    .site-header a:hover {
      opacity: 0.88;
    }

    @media (max-width: 1100px) {
      .nm-logo {
        left: 8.5%;
        top: 22%;
      }

      .header-top-nav {
        left: 54%;
        top: 30%;
        gap: 1.2vw;
      }

      .header-bottom-left {
        left: 10.5%;
        gap: 2.4vw;
      }

      .header-bottom-right {
        right: 8%;
      }
    }

    @media (max-width: 760px) {
      .nm-logo {
        left: 7%;
        top: 20%;
        gap: 0.8vw;
      }

      .nm-logo-box {
        padding: 1.1vw 0.8vw 0.8vw;
      }

      .header-top-nav {
        top: 28%;
        left: 57%;
        gap: 0.9vw;
      }

      .header-bottom-left {
        left: 9%;
        bottom: 4.8%;
        gap: 1.8vw;
      }

      .header-bottom-right {
        right: 6.5%;
        bottom: 4%;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" role="banner">
    <div class="header-overlay">
      <div class="nm-logo" aria-label="NM26 logo">
        <div class="nm-logo-box">
          <span>NM</span>
        </div>
        <div class="nm-logo-number">26</div>
      </div>

      <nav class="header-top-nav" aria-label="Header topics">
        <a href="#history">HISTORY</a>
        <span class="divider" aria-hidden="true">✣</span>
        <a href="#mystery">MYSTERY</a>
        <span class="divider" aria-hidden="true">✣</span>
        <a href="#miracles">MIRACLES</a>
      </nav>

      <nav class="header-bottom-left" aria-label="Primary navigation">
        <a href="#home">HOME</a>
        <a href="#plan">PLAN</a>
        <a href="#guide">GUIDE</a>
      </nav>

      <a class="header-bottom-right" href="#vacation">VACATION 2026</a>
    </div>
  </header>
</body>
</html>
