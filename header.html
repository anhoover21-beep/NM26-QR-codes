<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 Header</title>

<style>
body{
margin:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER IMAGE */

.nm-header{
width:min(100%, 1900px);
margin:0 auto;
}

.nm-banner{
width:100%;
height:auto;
display:block;
}

/* NAV BELOW HEADER */

.nm-home-nav-wrap{
width:min(100%, 1900px);
margin:0 auto;
background:#C83F07;
border-top:2px solid #377654;
}

.nm-home-nav{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:14px 20px;
flex-wrap:wrap;
}

.nm-home-nav a{
text-decoration:none;
font-size:clamp(14px, 2vw, 22px);
font-weight:500;
letter-spacing:1px;
color:#3682D2E;
line-height:1;
}

.nm-home-nav a:hover{
opacity:0.85;
}

/* MOBILE */

@media (max-width: 600px){
.nm-home-nav{
gap:22px;
padding:12px 14px;
}

.nm-home-nav a{
font-size:clamp(13px, 4vw, 18px);
letter-spacing:0.5px;
}
}
</style>
</head>

<body>

<header class="nm-header">
  <img src="/NM26-QR-codes/assets/images/header_banner.png" class="nm-banner" alt="NM26 Header">
</header>

<div class="nm-home-nav-wrap">
  <nav class="nm-home-nav">
    <a href="index.html">HOME</a>
    <a href="nightly-missions.html">PLAN</a>
    <a href="itinerary.html">GUIDE</a>
  </nav>
</div>

</body>
</html>
