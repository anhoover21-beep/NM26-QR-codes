<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 Header</title>

<style>

body{
margin:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER FRAME */

.nm-header{
position:relative;
background:#682D2E;
border:4px solid #EE8537;
padding:35px 35px 1px 35px; /* 👈 FIXED (bottom reduced) */
max-width:1900px;
margin:auto;
overflow:hidden;
}

/* DIAMOND PATTERN */

.pattern{
position:absolute;
pointer-events:none;
}

.pattern-top{
top:8px;
left:8px;
right:8px;
display:flex;
justify-content:space-between;
}

.pattern-left{
left:8px;
top:8px;
bottom:8px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.pattern-bottom{
bottom:8px;
left:320px;
right:300px;
display:flex;
justify-content:space-between;
}
  
.pattern-right{
right:8px;
top:8px;
bottom:8px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.diamond{
width:18px;
height:18px;
background:#C83F07;
transform:rotate(45deg);
}

/* INNER PANEL */

.nm-panel{
background:#EE8537;
}

/* TOP AREA */

.nm-top{
position:relative;
display:flex;
align-items:center;
padding:30px 30px;
}

/* LOGO */

.nm-logo{
display:flex;
align-items:center;
gap:5px;
}

.nm-state-wrap{
position:relative;
width:95px;
}

.nm-state{
width:100%;
}

.nm-state-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-55%);
font-size:50px;
font-weight:900;
color:white;
}

.nm-number{
font-size:55px;
font-weight:900;
color:#682D2E;
}

/* TOP NAV */

.nm-main a{
text-decoration:none;
font-size:55px;
font-weight:900;
color:#682D2E;
}

.nm-main{
position:absolute;
left:60%;
transform:translateX(-60%);
display:flex;
align-items:center;
gap:15px;
}

.divider{
font-size:36px;
color:#682D2E;
}

/* BOTTOM BAR */

.nm-bottom{
background:#682D2E;
padding:5px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LEFT NAV */

.nm-left{
display:flex;
gap:40px;
}

.nm-left a{
text-decoration:none;
font-size:20px;
color:#EE8537;
}

/* RIGHT TEXT */

.nm-right{
font-size:20px;
font-weight:900;
color:#C83F07;
}

</style>
</head>

<body>

<header class="nm-header">

<!-- DIAMOND FRAME -->

<div class="pattern pattern-top">
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
<div class="diamond"></div><div class="diamond"></div>
</div>

<div class="pattern pattern-left">
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>  
</div>

<div class="pattern pattern-bottom">
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>  
</div>  
  
<div class="pattern pattern-right">
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>
<div class="diamond"></div>
</div>

<!-- MAIN PANEL -->

<div class="nm-panel">

<div class="nm-top">

<div class="nm-logo">

<div class="nm-state-wrap">
<img src="assets/images/new-mexico.png" class="nm-state">
<span class="nm-state-text">NM</span>
</div>

<span class="nm-number">26</span>

</div>

<nav class="nm-main">
<a href="#">HISTORY</a>
<span class="divider">✣</span>
<a href="#">MYSTERY</a>
<span class="divider">✣</span>
<a href="#">MIRACLES</a>
</nav>

</div>


<div class="nm-bottom">

<nav class="nm-left">
<a href="#">HOME</a>
<a href="#">PLAN</a>
<a href="#">GUIDE</a>
</nav>

<div class="nm-right">
VACATION 2026
</div>

</div>

</div>

</header>

</body>
</html>
