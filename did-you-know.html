<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 — Did You Know?</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at top, #3b2a1f 0%, #1c140f 45%, #0f0b08 100%);
    color: #f5e7c8;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .page {
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .speech-bubble {
    max-width: 850px;
    width: 100%;
    min-height: 88px;
    background: rgba(255, 248, 230, 0.96);
    color: #3b2414;
    border: 4px solid #7a4d28;
    border-radius: 24px;
    padding: 18px 22px;
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    line-height: 1.4;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    position: relative;
  }

  .speech-bubble::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -22px;
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 22px solid rgba(255, 248, 230, 0.96);
    filter: drop-shadow(0 3px 0 #7a4d28);
  }

  .stage {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-top: 8px;
  }

  .dusty-wrap {
    position: relative;
    width: min(92vw, 520px);
    aspect-ratio: 1 / 1;
  }

  .dusty-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  .base {
    z-index: 1;
  }

  .hand {
    z-index: 2;
    transform-origin: 50% 88%;
    animation: handWag 3.2s ease-in-out infinite;
  }

  .brow-left,
  .brow-right {
    z-index: 3;
    transform-origin: center center;
  }

  .eyes {
    z-index: 4;
    opacity: 0;
  }

  .mouth {
    z-index: 5;
    opacity: 0;
  }

  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    appearance: none;
    border: none;
    border-radius: 999px;
    padding: 14px 24px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    background: linear-gradient(180deg, #f4c56c 0%, #d18b28 100%);
    color: #2f1b0e;
    box-shadow:
      0 6px 18px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.45);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(1px);
  }

  .status {
    min-height: 24px;
    font-size: 0.95rem;
    color: #f5deb0;
    opacity: 0.95;
    text-align: center;
  }

  @keyframes handWag {
    0%   { transform: rotate(0deg); }
    15%  { transform: rotate(0deg); }
    35%  { transform: rotate(6deg); }
    50%  { transform: rotate(0deg); }
    65%  { transform: rotate(-4deg); }
    85%  { transform: rotate(2deg); }
    100% { transform: rotate(0deg); }
  }

  @keyframes browLiftLeft {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-3px) rotate(-2deg); }
  }

  @keyframes browLiftRight {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-2px) rotate(2deg); }
  }

  .brow-left.active {
    animation: browLiftLeft 0.7s ease-in-out 1;
  }

  .brow-right.active {
    animation: browLiftRight 0.7s ease-in-out 1;
  }

  @media (max-width: 640px) {
    body {
      padding: 14px;
    }

    .speech-bubble {
      min-height: 96px;
      padding: 16px 16px;
    }

    .btn {
      width: 100%;
      max-width: 320px;
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="speech-bubble" id="speechBubble">
    Tap “Did You Know?” and ol’ Dusty will tell you something.
  </div>

  <div class="stage">
    <div class="dusty-wrap" id="dustyWrap">
      <img src="assets/images/dusty_base.png" class="dusty-layer base" alt="Dusty base">
      <img src="assets/images/dusty_hand.png" class="dusty-layer hand" alt="">
      <img src="assets/images/dusty_brow_1.png" class="dusty-layer brow-left" alt="">
      <img src="assets/images/dusty_brow_2.png" class="dusty-layer brow-right" alt="">
      <img src="assets/images/dusty_eyes_closed.png" class="dusty-layer eyes" alt="">
      <img src="assets/images/dusty_mouth_closed.png" class="dusty-layer mouth" alt="">
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="didYouKnowBtn">Did You Know?</button>
  </div>

  <div class="status" id="statusText"></div>
</div>

<script>
  const facts = [
    "Did you know? New Mexico has more than three hundred days of sunshine each year.",
    "Did you know? White Sands is made of gypsum crystals, not regular beach sand.",
    "Did you know? Carlsbad Caverns has one of the largest cave chambers in North America.",
    "Did you know? Route 66 helped make Tucumcari one of the most famous roadside towns in the Southwest.",
    "Did you know? Santa Rosa Blue Hole stays clear and cool year-round.",
    "Did you know? Roswell became world famous after the 1947 incident near town.",
    "Did you know? Bandelier preserves cliff dwellings built by the Ancestral Pueblo people.",
    "Did you know? Three Rivers Petroglyph Site has thousands of ancient rock carvings.",
    "Did you know? The Turquoise Trail is one of the prettiest drives between Santa Rosa country and Santa Fe country.",
    "Did you know? The Rio Grande Gorge Bridge stands hundreds of feet above the river below.",
    "Did you know? Valley of Fires was created by an ancient lava flow, not a mountain eruption.",
    "Did you know? New Mexico blends Native, Spanish, Mexican, and Old West history in one state.",
    "Did you know? Santa Fe is one of the oldest capital cities in the United States.",
    "Did you know? Tinkertown is packed with handmade folk art and oddball detail.",
    "Did you know? The night sky in New Mexico can be dark enough to see the Milky Way with the naked eye.",
    "Did you know? Route 66 neon signs look even better after sundown.",
    "Did you know? In New Mexico, history is written in stone and mystery is written in the stars."
  ];

  const audioFiles = Array.from({ length: 17 }, (_, i) => `assets/audio/bats${i + 1}.mp3`);

  const speechBubble = document.getElementById("speechBubble");
  const statusText = document.getElementById("statusText");
  const btn = document.getElementById("didYouKnowBtn");

  const eyes = document.querySelector(".eyes");
  const mouth = document.querySelector(".mouth");
  const browLeft = document.querySelector(".brow-left");
  const browRight = document.querySelector(".brow-right");

  let currentAudio = null;
  let mouthTimer = null;
  let blinkTimer = null;
  let eyebrowTimer = null;

  function blinkOnce(duration = 140) {
    eyes.style.opacity = "1";
    setTimeout(() => {
      eyes.style.opacity = "0";
    }, duration);
  }

  function scheduleBlinkLoop() {
    clearTimeout(blinkTimer);

    const nextBlink = () => {
      const wait = 2400 + Math.random() * 2600;
      blinkTimer = setTimeout(() => {
        blinkOnce(150);
        nextBlink();
      }, wait);
    };

    nextBlink();
  }

  function pulseBrows() {
    browLeft.classList.remove("active");
    browRight.classList.remove("active");

    void browLeft.offsetWidth;
    void browRight.offsetWidth;

    browLeft.classList.add("active");
    browRight.classList.add("active");

    clearTimeout(eyebrowTimer);
    eyebrowTimer = setTimeout(() => {
      browLeft.classList.remove("active");
      browRight.classList.remove("active");
    }, 750);
  }

  function startTalking() {
    stopTalking();

    mouthTimer = setInterval(() => {
      mouth.style.opacity = mouth.style.opacity === "1" ? "0" : "1";
    }, 170);
  }

  function stopTalking() {
    if (mouthTimer) {
      clearInterval(mouthTimer);
      mouthTimer = null;
    }
    mouth.style.opacity = "0";
  }

  function stopCurrentAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
    stopTalking();
  }

  function playRandomFact() {
    stopCurrentAudio();

    const index = Math.floor(Math.random() * audioFiles.length);
    const audioSrc = audioFiles[index];
    const line = facts[index] || "Did you know?";

    speechBubble.textContent = line;
    statusText.textContent = `Playing fact ${index + 1} of ${audioFiles.length}`;

    const audio = new Audio(audioSrc);
    currentAudio = audio;

    audio.addEventListener("play", () => {
      startTalking();
      pulseBrows();
    });

    audio.addEventListener("ended", () => {
      stopTalking();
      statusText.textContent = "";
    });

    audio.addEventListener("pause", () => {
      stopTalking();
    });

    audio.addEventListener("error", () => {
      stopTalking();
      statusText.textContent = "Could not load audio file.";
      speechBubble.textContent = `Audio missing: ${audioSrc}`;
    });

    audio.play().catch(() => {
      stopTalking();
      statusText.textContent = "Audio playback was blocked or failed.";
      speechBubble.textContent = `Could not play: ${audioSrc}`;
    });
  }

  btn.addEventListener("click", playRandomFact);

  scheduleBlinkLoop();

  // Optional: subtle occasional eyebrow lift even when idle
  setInterval(() => {
    if (!currentAudio || currentAudio.paused) {
      if (Math.random() > 0.55) {
        pulseBrows();
      }
    }
  }, 5000);
</script>

</body>
</html>
