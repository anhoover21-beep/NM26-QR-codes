<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NM26 — Did You Know?</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #f6e7c4;
      background:
        radial-gradient(circle at top, #4c3322 0%, #21160f 45%, #0f0a07 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .page {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .speech-bubble {
      width: min(100%, 900px);
      min-height: 90px;
      background: rgba(255, 247, 228, 0.97);
      color: #3b2414;
      border: 4px solid #7c4d25;
      border-radius: 24px;
      padding: 18px 20px;
      text-align: center;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      line-height: 1.4;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -20px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 20px solid rgba(255, 247, 228, 0.97);
      filter: drop-shadow(0 3px 0 #7c4d25);
    }

    .dusty-shell {
      width: min(100%, 900px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 4px;
    }

    .dusty-stage {
      position: relative;
      width: min(92vw, 720px);
      max-width: 100%;
    }

    .dusty-base {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
    }

    .dusty-full {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .dusty-eyes {
      z-index: 5;
      opacity: 0;
    }

    .dusty-mouth {
      z-index: 6;
      opacity: 0;
    }

    .dusty-part {
      position: absolute;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .dusty-hand {
      z-index: 2;
      transform-origin: 50% 92%;
      animation: dustyHandWag 3.5s ease-in-out infinite;
    }

    .dusty-brow-1,
    .dusty-brow-2 {
      z-index: 4;
      transform-origin: 50% 50%;
    }

    .dusty-brow-1.lift {
      animation: dustyBrowLift1 0.5s ease-in-out 1;
    }

    .dusty-brow-2.lift {
      animation: dustyBrowLift2 0.5s ease-in-out 1;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #2f1b0d;
      background: linear-gradient(180deg, #f5c86f 0%, #d08a26 100%);
      box-shadow:
        0 6px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: transform 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .status {
      min-height: 22px;
      font-size: 0.95rem;
      color: #f7ddb0;
      text-align: center;
    }

    @keyframes dustyHandWag {
      0%   { transform: rotate(0deg); }
      14%  { transform: rotate(0deg); }
      30%  { transform: rotate(5deg); }
      48%  { transform: rotate(0deg); }
      66%  { transform: rotate(-3deg); }
      84%  { transform: rotate(2deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes dustyBrowLift1 {
      0%   { transform: translateY(0) rotate(0deg); }
      50%  { transform: translateY(-4px) rotate(-3deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    @keyframes dustyBrowLift2 {
      0%   { transform: translateY(0) rotate(0deg); }
      50%  { transform: translateY(-4px) rotate(3deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .speech-bubble {
        min-height: 96px;
        padding: 16px;
      }

      .btn {
        width: min(100%, 320px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="speech-bubble" id="speechBubble">
      Tap “Did You Know?” and Dusty will tell you something.
    </div>

    <div class="dusty-shell">
      <div class="dusty-stage" id="dustyStage">
        <img
          id="dustyBase"
          src="assets/images/dusty_base.png"
          class="dusty-base"
          alt="Dusty"
        >

        <img
          id="dustyEyes"
          src="assets/images/dusty_eyes_closed.png"
          class="dusty-full dusty-eyes"
          alt=""
        >

        <img
          id="dustyMouth"
          src="assets/images/dusty_mouth_closed.png"
          class="dusty-full dusty-mouth"
          alt=""
        >

        <img
          id="dustyHand"
          src="assets/images/dusty_hand.png"
          class="dusty-part dusty-hand"
          alt=""
        >

        <img
          id="dustyBrow1"
          src="assets/images/dusty_brow_1.png"
          class="dusty-part dusty-brow-1"
          alt=""
        >

        <img
          id="dustyBrow2"
          src="assets/images/dusty_brow_2.png"
          class="dusty-part dusty-brow-2"
          alt=""
        >
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="didYouKnowBtn">Did You Know?</button>
    </div>

    <div class="status" id="statusText"></div>
  </div>

  <script>
    const dustyPlacement = {
      hand:  { width: 270, height: 285, top: 310, left: 270 },
      brow1: { width: 148, height: 84,  top: 320, left: 720 },
      brow2: { width: 166, height: 99,  top: 340, left: 915 }
    };

    const facts = [
      "Did you know? New Mexico has more than three hundred days of sunshine each year.",
      "Did you know? White Sands is made of gypsum crystals, not regular beach sand.",
      "Did you know? Carlsbad Caverns has one of the largest cave chambers in North America.",
      "Did you know? Route 66 helped make Tucumcari one of the most famous roadside towns in the Southwest.",
      "Did you know? Santa Rosa Blue Hole stays clear and cool year-round.",
      "Did you know? Roswell became world famous after the 1947 incident near town.",
      "Did you know? Bandelier preserves cliff dwellings built by the Ancestral Pueblo people.",
      "Did you know? Three Rivers Petroglyph Site has thousands of ancient rock carvings.",
      "Did you know? The Turquoise Trail is one of the prettiest drives in New Mexico.",
      "Did you know? The Rio Grande Gorge Bridge stands high above the river below.",
      "Did you know? Valley of Fires came from an ancient lava flow.",
      "Did you know? New Mexico blends Native, Spanish, Mexican, and Old West history all in one state.",
      "Did you know? Santa Fe is one of the oldest capital cities in the United States.",
      "Did you know? Tinkertown is packed with handmade folk art and oddball detail.",
      "Did you know? New Mexico night skies can be dark enough to reveal the Milky Way with the naked eye.",
      "Did you know? Route 66 neon signs look even better after sundown.",
      "Did you know? In New Mexico, history is written in stone and mystery is written in the stars."
    ];

    const audioFiles = Array.from(
      { length: 17 },
      (_, i) => `assets/audio/bats${i + 1}.mp3`
    );

    const speechBubble = document.getElementById("speechBubble");
    const statusText = document.getElementById("statusText");
    const didYouKnowBtn = document.getElementById("didYouKnowBtn");

    const dustyBase = document.getElementById("dustyBase");
    const dustyEyes = document.getElementById("dustyEyes");
    const dustyMouth = document.getElementById("dustyMouth");
    const dustyHand = document.getElementById("dustyHand");
    const dustyBrow1 = document.getElementById("dustyBrow1");
    const dustyBrow2 = document.getElementById("dustyBrow2");

    let currentAudio = null;
    let mouthTimer = null;
    let blinkTimer = null;

    function placePart(el, part, baseW, baseH) {
      el.style.width = `${(part.width / baseW) * 100}%`;
      el.style.left = `${(part.left / baseW) * 100}%`;
      el.style.top = `${(part.top / baseH) * 100}%`;
    }

    function positionDustyParts() {
      const baseW = dustyBase.naturalWidth;
      const baseH = dustyBase.naturalHeight;

      if (!baseW || !baseH) return;

      placePart(dustyHand, dustyPlacement.hand, baseW, baseH);
      placePart(dustyBrow1, dustyPlacement.brow1, baseW, baseH);
      placePart(dustyBrow2, dustyPlacement.brow2, baseW, baseH);
    }

    function blinkOnce(duration = 150) {
      dustyEyes.style.opacity = "1";
      setTimeout(() => {
        dustyEyes.style.opacity = "0";
      }, duration);
    }

    function scheduleBlinkLoop() {
      clearTimeout(blinkTimer);

      function queueBlink() {
        const delay = 2600 + Math.random() * 2600;
        blinkTimer = setTimeout(() => {
          blinkOnce(150);
          queueBlink();
        }, delay);
      }

      queueBlink();
    }

    function startTalking() {
      stopTalking();

      mouthTimer = setInterval(() => {
        dustyMouth.style.opacity =
          dustyMouth.style.opacity === "1" ? "0" : "1";
      }, 170);
    }

    function stopTalking() {
      if (mouthTimer) {
        clearInterval(mouthTimer);
        mouthTimer = null;
      }
      dustyMouth.style.opacity = "0";
    }

    function liftBrows() {
      dustyBrow1.classList.remove("lift");
      dustyBrow2.classList.remove("lift");

      void dustyBrow1.offsetWidth;
      void dustyBrow2.offsetWidth;

      dustyBrow1.classList.add("lift");
      dustyBrow2.classList.add("lift");
    }

    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      stopTalking();
      statusText.textContent = "";
    }

    function playRandomFact() {
      stopCurrentAudio();

      const index = Math.floor(Math.random() * audioFiles.length);
      const file = audioFiles[index];
      const fact = facts[index] || "Did you know?";

      speechBubble.textContent = fact;
      statusText.textContent = `Playing fact ${index + 1} of ${audioFiles.length}`;

      const audio = new Audio(file);
      currentAudio = audio;

      audio.addEventListener("play", () => {
        startTalking();
        liftBrows();
      });

      audio.addEventListener("ended", () => {
        stopTalking();
        statusText.textContent = "";
      });

      audio.addEventListener("pause", () => {
        stopTalking();
      });

      audio.addEventListener("error", () => {
        stopTalking();
        statusText.textContent = "Audio file could not be loaded.";
        speechBubble.textContent = `Missing audio: ${file}`;
      });

      audio.play().catch(() => {
        stopTalking();
        statusText.textContent = "Audio playback failed.";
        speechBubble.textContent = `Could not play: ${file}`;
      });
    }

    didYouKnowBtn.addEventListener("click", playRandomFact);

    dustyBase.addEventListener("load", positionDustyParts);
    window.addEventListener("resize", positionDustyParts);

    if (dustyBase.complete) {
      positionDustyParts();
    }

    scheduleBlinkLoop();

    setInterval(() => {
      if (!currentAudio || currentAudio.paused) {
        if (Math.random() > 0.55) {
          liftBrows();
        }
      }
    }, 5000);
  </script>
</body>
</html>
