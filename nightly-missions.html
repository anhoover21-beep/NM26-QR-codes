function getTripDay(nowDate, startDate) {
    const start = new Date(startDate);
    start.setHours(0, 0, 0, 0);

    const today = new Date(nowDate);
    today.setHours(0, 0, 0, 0);

    const diffMs = today - start;
    return Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1;
}

function getNextUnlockTime(currentTime) {
    const firstUnlock = new Date(tripStart);
    firstUnlock.setHours(unlockHour, 0, 0, 0);

    if (currentTime < firstUnlock) {
        return firstUnlock;
    }

    if (currentTime > tripEnd) {
        return null;
    }

    const next = new Date(currentTime);
    next.setHours(unlockHour, 0, 0, 0);

    if (currentTime >= next) {
        next.setDate(next.getDate() + 1);
        next.setHours(unlockHour, 0, 0, 0);
    }

    if (next > tripEnd) {
        return null;
    }

    return next;
}

function isMissionUnlocked(currentTime) {
    if (currentTime < tripStart || currentTime > tripEnd) {
        return false;
    }

    const unlockToday = new Date(currentTime);
    unlockToday.setHours(unlockHour, 0, 0, 0);

    return currentTime >= unlockToday;
}

function showTripOver() {
    missionSection.style.display = "block";
    missionSection.innerHTML = `
        <div class="trip-over-wrap">
            <h1>Trip is over, Jackass.<br>Stop Scanning.</h1>
            <img src="assets/images/jackass.png" alt="Jackass">
        </div>
    `;
}

function showMission() {
    missionSection.style.display = "block";
    const tripDay = getTripDay(now, tripStart);

    missionSection.innerHTML = dailyMissions[tripDay] || `
        <div class="mission-card">
            <h1>No mission found for Day ${tripDay}</h1>
            <p>Somehow you broke it. Impressive.</p>
        </div>
    `;
}

function showLocked() {
    lockedSection.style.display = "block";
    startCountdown();
}

if (now > tripEnd) {
    showTripOver();
} else if (isMissionUnlocked(now)) {
    showMission();
} else {
    showLocked();
}

function startCountdown() {
    const countdownElement = document.getElementById("countdown");

function updateCountdown() {
    const currentTime = new Date();

    if (isMissionUnlocked(currentTime)) {
        location.reload();
        return;
    }

    const nextUnlock = getNextUnlockTime(currentTime);

    if (!nextUnlock) {
        location.reload();
        return;
    }

    const diff = nextUnlock - currentTime;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    if (days > 0) {
        countdownElement.textContent =
            `Mission unlocks in ${days}d ${hours}h ${minutes}m ${seconds}s`;
    } else {
        countdownElement.textContent =
            `Mission unlocks in ${hours}h ${minutes}m ${seconds}s`;
    }
}

    updateCountdown();
    setInterval(updateCountdown, 1000);
}
</script>
