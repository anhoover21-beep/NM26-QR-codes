<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 Mission Portal</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
        color: #222;
    }

    /* ===== HEADER ===== */

    .nm-header {
        background: #c5161d;
        color: white;
    }

    .nm-header-inner {
        max-width: 1300px;
        margin: 0 auto;
        padding: 30px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .nm-brand {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .nm-state {
        width: 110px;
        height: 110px;
        background: url("assets/images/new-mexico.png") no-repeat center;
        background-size: contain;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nm-text {
        font-size: 40px;
        font-weight: 900;
        letter-spacing: 2px;
        color: white;
    }

    .nm-year {
        font-size: 72px;
        font-weight: 900;
        color: #ffd23f;
    }

    .nm-nav {
        display: flex;
        gap: 60px;
    }

    .nm-nav span {
        color: white;
        font-size: 26px;
        letter-spacing: 2px;
        font-weight: 600;
    }

    .nm-login span {
        background: #ffd23f;
        color: #c5161d;
        padding: 12px 26px;
        border-radius: 16px;
        font-weight: 900;
        font-size: 22px;
    }

    .nm-stripe {
        background: #ffd23f;
        padding: 10px 40px;
        font-weight: 900;
        color: #c5161d;
        letter-spacing: 2px;
    }

    /* ===== LOCKED SCREEN ===== */

    .section {
        display: none;
        text-align: center;
        padding: 80px 20px;
    }

    .locked-message {
        font-size: 44px;
        font-weight: 900;
        margin-bottom: 30px;
    }

    .locked-image {
        max-width: 360px;
        width: 100%;
        margin-bottom: 30px;
    }

    .countdown {
        font-size: 22px;
        font-weight: bold;
        margin-top: 20px;
    }

</style>
</head>

<body>

<header class="nm-header">
    <div class="nm-header-inner">

        <div class="nm-brand">
            <div class="nm-state">
                <span class="nm-text">NM</span>
            </div>
            <span class="nm-year">26</span>
        </div>

        <nav class="nm-nav">
            <span>HOME</span>
            <span>PLANNER</span>
            <span>RESOURCES</span>
            <span>GUIDE</span>
        </nav>

        <div class="nm-login">
            <span>LOGIN</span>
        </div>

    </div>

    <div class="nm-stripe">
        VACATION 2026
    </div>
</header>

<div class="main-content">

  <div id="locked" class="section">
    <div class="locked-message">
        Not ready yet, Jackass.<br>
        Learn to follow directions.
    </div>

    <img src="assets/images/jackass.png" class="locked-image" alt="Jackass">

    <div class="countdown" id="countdown"></div>
  </div>

  <div id="mission" class="section">
    <div class="mission-card"></div>
  </div>

</div>

<script>
const tripStart = new Date("2026-06-05T00:00:00");
const tripEnd   = new Date("2026-06-12T23:59:59");

const now = new Date();
const currentHour = now.getHours();

const lockedSection = document.getElementById("locked");
const missionSection = document.getElementById("mission");

const missions = {
  "2026-06-05": {
    title: "Night Mission 1",
    subtitle: "Arrival Night",
    body: "Tonight’s mission: settle in, explore the area, and capture your first official NM26 night photo.",
    image: "assets/images/mission1.png"
  },
  "2026-06-06": {
    title: "Night Mission 2",
    subtitle: "Santa Fe Evening Objective",
    body: "Walk the plaza, look for the best lit landmark, and log one thing that felt oldest, strangest, or most magical.",
    image: "assets/images/mission2.png"
  },
  "2026-06-07": {
    title: "Night Mission 3",
    subtitle: "Taos Debrief",
    body: "After today’s route, compare the weirdest stop, the prettiest stop, and the one place you’d return to.",
    image: "assets/images/mission3.png"
  },
  "2026-06-08": {
    title: "Night Mission 4",
    subtitle: "High Desert Signal",
    body: "Step outside after dark and look up. Find the brightest object in the sky and make your best guess what it is.",
    image: "assets/images/mission4.png"
  },
  "2026-06-09": {
    title: "Night Mission 5",
    subtitle: "Roswell Watch",
    body: "You are now authorized to begin low-level anomaly monitoring. Note any lights, sounds, or suspicious activity.",
    image: "assets/images/mission5.png"
  },
  "2026-06-10": {
    title: "Night Mission 6",
    subtitle: "Carlsbad After Action Report",
    body: "Record the most impressive natural sight of the day and rank today’s adventure from 1 to 10.",
    image: "assets/images/mission6.png"
  },
  "2026-06-11": {
    title: "Night Mission 7",
    subtitle: "Final Night Directive",
    body: "Choose your top memory of the trip so far and declare the unofficial winner of NM26.",
    image: "assets/images/mission7.png"
  },
  "2026-06-12": {
    title: "Night Mission 8",
    subtitle: "Return Home Protocol",
    body: "Mission nearly complete. Confirm final highlights, funniest moment, and one stop worth repeating next time.",
    image: "assets/images/mission8.png"
  }
};

function getLocalDateKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function renderMission() {
  const dateKey = getLocalDateKey(now);
  const mission = missions[dateKey];

  if (!mission) {
    missionSection.innerHTML = `
      <div style="max-width:800px;margin:80px auto;padding:30px;background:white;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.12);">
        <h1 style="margin-top:0;color:#c5161d;">No mission loaded</h1>
        <p>There is no mission assigned for ${dateKey} yet.</p>
      </div>
    `;
    return;
  }

  missionSection.innerHTML = `
    <div style="max-width:900px;margin:60px auto;padding:0 20px;">
      <div style="background:white;border-radius:24px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,0.15);">
        ${mission.image ? `<img src="${mission.image}" alt="${mission.title}" style="width:100%;display:block;max-height:420px;object-fit:cover;">` : ""}
        <div style="padding:32px;">
          <div style="font-size:14px;font-weight:900;letter-spacing:2px;color:#c5161d;text-transform:uppercase;margin-bottom:10px;">
            NM26 Night Mission
          </div>
          <h1 style="margin:0 0 10px 0;font-size:40px;color:#222;">${mission.title}</h1>
          <h2 style="margin:0 0 20px 0;font-size:22px;color:#666;">${mission.subtitle}</h2>
          <p style="font-size:20px;line-height:1.6;margin:0;color:#222;">
            ${mission.body}
          </p>
        </div>
      </div>
    </div>
  `;
}

if (now > tripEnd) {
  missionSection.style.display = "block";
  missionSection.innerHTML = `
    <h1 style="text-align:center;margin-top:80px;">
      Trip is over, Jackass. Stop Scanning.
    </h1>
    <div style="text-align:center;margin-top:30px;">
      <img src="assets/images/jackass.png" style="max-width:300px;">
    </div>
  `;
}
else if (currentHour >= 18 && now >= tripStart && now <= tripEnd) {
  missionSection.style.display = "block";
  renderMission();
}
else {
  lockedSection.style.display = "block";
  startCountdown();
}

function startCountdown() {
  const countdownElement = document.getElementById("countdown");

  function updateCountdown() {
    const now = new Date();
    const unlockTime = new Date();
    unlockTime.setHours(18, 0, 0, 0);
    const diff = unlockTime - now;

    if (diff <= 0) {
      location.reload();
      return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    countdownElement.textContent = `Mission unlocks in ${hours}h ${minutes}m ${seconds}s`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
}
</script>



</body>
</html>
