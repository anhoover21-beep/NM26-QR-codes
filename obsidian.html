<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM26 — Did You Know?</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at 50% 18%, rgba(255, 210, 63, 0.55) 0%, rgba(255, 210, 63, 0.18) 20%, rgba(255, 255, 255, 0) 42%),
        linear-gradient(180deg, #f8f1d5 0%, #f2f2f2 42%, #ececec 100%);
    color: #222;
    overflow-x: hidden;
}

.nm-header {
    background: #c5161d;
    color: white;
    position: relative;
    z-index: 10;
    width: 100%;
}

.nm-header-inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: clamp(16px, 3vw, 28px) clamp(16px, 4vw, 40px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(16px, 2vw, 28px);
    flex-wrap: wrap;
}

.nm-brand {
    display: flex;
    align-items: center;
    gap: clamp(10px, 1.8vw, 16px);
    min-width: 0;
}

.nm-state {
    width: clamp(58px, 10vw, 110px);
    aspect-ratio: 1 / 1;
    background: url("assets/images/new-mexico.png") no-repeat center;
    background-size: contain;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.nm-text {
    font-size: clamp(18px, 3vw, 40px);
    font-weight: 900;
    letter-spacing: clamp(1px, 0.25vw, 2px);
    color: white;
}

.nm-year {
    font-size: clamp(34px, 7vw, 72px);
    font-weight: 900;
    color: #ffd23f;
    line-height: 1;
    flex-shrink: 0;
}

.nm-nav {
    display: flex;
    gap: clamp(14px, 4vw, 60px);
    flex-wrap: wrap;
    justify-content: center;
}

.nm-nav span {
    color: white;
    font-size: clamp(14px, 2vw, 26px);
    letter-spacing: clamp(1px, 0.25vw, 2px);
    font-weight: 600;
    white-space: nowrap;
}

.nm-login {
    display: flex;
    justify-content: center;
}

.nm-login span {
    background: #ffd23f;
    color: #c5161d;
    padding: clamp(9px, 1.5vw, 12px) clamp(16px, 2.6vw, 26px);
    border-radius: 16px;
    font-weight: 900;
    font-size: clamp(16px, 2vw, 22px);
    white-space: nowrap;
}

.nm-stripe {
    background: #ffd23f;
    padding: 10px clamp(16px, 4vw, 40px);
    font-weight: 900;
    color: #c5161d;
    letter-spacing: 2px;
    font-size: clamp(12px, 1.7vw, 16px);
}

.page-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 clamp(12px, 3vw, 24px) 70px;
}

.poster-hero {
    min-height: calc(100vh - 172px);
    display: grid;
    align-items: center;
    justify-items: center;
    text-align: center;
    position: relative;
    padding: 40px 0 10px;
}

.poster-hero::before,
.poster-hero::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
}

.poster-hero::before {
    width: min(78vw, 860px);
    height: min(78vw, 860px);
    top: 40px;
    background: radial-gradient(circle, rgba(255, 210, 63, 0.16) 0%, rgba(255, 210, 63, 0.06) 36%, rgba(255, 210, 63, 0) 68%);
    filter: blur(8px);
}

.poster-hero::after {
    width: min(56vw, 620px);
    height: min(56vw, 620px);
    top: 120px;
    background: radial-gradient(circle, rgba(197, 22, 29, 0.10) 0%, rgba(197, 22, 29, 0.03) 35%, rgba(197, 22, 29, 0) 68%);
    filter: blur(10px);
}

.hero-kicker {
    margin: 0 0 12px;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 5px;
    color: #c5161d;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
}

.hero-title {
    margin: 0;
    font-size: clamp(48px, 8vw, 104px);
    line-height: 0.92;
    letter-spacing: 3px;
    font-weight: 900;
    color: #1b1b1b;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    max-width: 1100px;
}

.hero-title-accent {
    display: block;
    color: #1b1b1b;
}

.hero-subtitle {
    margin: 18px 0 24px;
    max-width: 780px;
    font-size: clamp(18px, 2vw, 28px);
    line-height: 1.45;
    color: #4a4a4a;
    position: relative;
    z-index: 1;
}

.speech-bubble {
    position: relative;
    margin: 16px auto 20px;
    width: min(100%, 860px);
    background: #fff8dc;
    color: #5b1f00;
    border: 3px solid #ffd23f;
    border-radius: 28px;
    padding: 22px 24px;
    font-size: clamp(18px, 1.7vw, 26px);
    font-weight: 700;
    line-height: 1.5;
    box-shadow: 0 16px 30px rgba(0, 0, 0, 0.08);
    min-height: 72px;
    z-index: 1;
    box-sizing: border-box;
}

.speech-bubble::after {
    content: "";
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 20px 18px 0 18px;
    border-style: solid;
    border-color: #ffd23f transparent transparent transparent;
}

.speech-bubble::before {
    content: "";
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 16px 14px 0 14px;
    border-style: solid;
    border-color: #fff8dc transparent transparent transparent;
    z-index: 1;
}

.traveler-stage {
    position: relative;
    width: min(92vw, 980px);
    margin: 8px auto 10px;
    display: flex;
    justify-content: center;
    align-items: end;
    z-index: 1;
}

.traveler-glow {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: min(85vw, 760px);
    height: min(85vw, 760px);
    background: radial-gradient(circle, rgba(255, 210, 63, 0.34) 0%, rgba(255, 210, 63, 0.14) 34%, rgba(255, 210, 63, 0) 66%);
    filter: blur(10px);
    pointer-events: none;
}

.traveler-shadow {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: min(60vw, 520px);
    height: 46px;
    background: radial-gradient(circle, rgba(0, 0, 0, 0.22) 0%, rgba(0, 0, 0, 0.12) 42%, rgba(0, 0, 0, 0) 76%);
    filter: blur(10px);
    pointer-events: none;
}

.dusty-mount {
    position: relative;
    width: min(92vw, 650px);
    max-width: 100%;
    margin: 0 auto;
    z-index: 1;
}

.dusty-widget {
    position: relative;
    width: 100%;
    opacity: 0;
    transition: opacity 0.2s ease;
}

.dusty-widget.is-ready {
    opacity: 1;
}

.dusty-base {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0 16px 26px rgba(0, 0, 0, 0.16));
}

.dusty-full,
.dusty-part {
    position: absolute;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
}

.dusty-full {
    top: 0;
    left: 0;
    width: 100%;
    height: auto;
}

.dusty-eyes {
    z-index: 5;
    opacity: 0;
}

.dusty-mouth {
    z-index: 6;
    opacity: 1;
}

.dusty-hand {
    z-index: 2;
    transform-origin: 50% 92%;
}

.dusty-widget.is-speaking .dusty-hand {
    animation: dustyHandWag 1.05s ease-in-out infinite;
}

.dusty-brow-1,
.dusty-brow-2 {
    z-index: 4;
    transform-origin: 50% 50%;
}

.dusty-brow-1.lower {
    animation: dustyBrowLower1 0.32s ease-in-out 1;
}

.dusty-brow-2.lower {
    animation: dustyBrowLower2 0.32s ease-in-out 1;
}

.controls {
    margin-top: 16px;
    position: relative;
    z-index: 1;
}

.did-you-know-btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    background: #d4121b;
    color: white;
    font-size: clamp(20px, 2vw, 28px);
    font-weight: 900;
    letter-spacing: 2px;
    padding: 18px 34px;
    border-radius: 22px;
    box-shadow: 0 16px 30px rgba(0, 0, 0, 0.16);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    text-transform: uppercase;
}

.did-you-know-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 34px rgba(0, 0, 0, 0.18);
}

.did-you-know-btn:active {
    transform: translateY(1px);
}

.did-you-know-btn:disabled {
    opacity: 0.8;
    cursor: wait;
}

@keyframes dustyHandWag {
    0%   { transform: rotate(0deg); }
    20%  { transform: rotate(5deg); }
    40%  { transform: rotate(0deg); }
    65%  { transform: rotate(-3deg); }
    82%  { transform: rotate(2deg); }
    100% { transform: rotate(0deg); }
}

@keyframes dustyBrowLower1 {
    0%   { transform: translateY(0) rotate(0deg); }
    50%  { transform: translateY(4px) rotate(2deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

@keyframes dustyBrowLower2 {
    0%   { transform: translateY(0) rotate(0deg); }
    50%  { transform: translateY(4px) rotate(-2deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

@media (max-width: 1024px) {
    .nm-header-inner {
        flex-direction: column;
        text-align: center;
    }

    .nm-nav {
        justify-content: center;
    }

    .page-container {
        padding: 0 18px 50px;
    }

    .poster-hero {
        min-height: auto;
        padding: 28px 0 10px;
    }

    .hero-kicker {
        font-size: 16px;
        letter-spacing: 4px;
    }

    .hero-title {
        font-size: clamp(38px, 7vw, 72px);
        line-height: 0.98;
        letter-spacing: 2px;
        max-width: 760px;
    }

    .hero-subtitle {
        margin: 14px 0 20px;
        font-size: clamp(18px, 2.4vw, 24px);
        max-width: 640px;
    }

    .speech-bubble {
        max-width: 700px;
        font-size: clamp(17px, 2.2vw, 22px);
        padding: 20px 20px;
    }

    .dusty-mount {
        width: min(74vw, 500px);
    }
}

@media (max-width: 700px) {
    .nm-header-inner {
        padding: 22px 18px;
    }

    .nm-brand {
        justify-content: center;
    }

    .nm-nav {
        gap: 16px;
    }

    .nm-stripe {
        padding: 10px 18px;
    }

    .page-container {
        padding: 0 12px 36px;
    }

    .poster-hero {
        padding: 20px 0 0;
        gap: 0;
    }

    .poster-hero::before {
        width: 440px;
        height: 440px;
        top: 90px;
    }

    .poster-hero::after {
        width: 300px;
        height: 300px;
        top: 170px;
    }

    .hero-kicker {
        margin-bottom: 8px;
        font-size: 14px;
        letter-spacing: 3px;
    }

    .hero-title {
        font-size: clamp(28px, 11vw, 46px);
        line-height: 0.98;
        letter-spacing: 1px;
        max-width: 100%;
    }

    .hero-subtitle {
        margin: 12px 0 16px;
        font-size: 16px;
        line-height: 1.4;
        max-width: 95%;
    }

    .speech-bubble {
        order: 3;
        width: calc(100% - 8px);
        max-width: none;
        margin: 14px auto 18px;
        padding: 16px 16px;
        border-radius: 22px;
        font-size: 16px;
        line-height: 1.45;
        min-height: 0;
    }

    .speech-bubble::after {
        bottom: -16px;
        border-width: 16px 14px 0 14px;
    }

    .speech-bubble::before {
        bottom: -13px;
        border-width: 13px 11px 0 11px;
    }

    .traveler-stage {
        width: 100%;
        margin: 4px auto 6px;
        order: 2;
    }

    .traveler-glow {
        width: 300px;
        height: 300px;
        bottom: 18px;
    }

    .traveler-shadow {
        width: 220px;
        height: 32px;
        bottom: 8px;
    }

    .dusty-mount {
        width: min(78vw, 320px);
    }

    .controls {
        order: 4;
        width: 100%;
        margin-top: 8px;
    }

    .did-you-know-btn {
        width: 100%;
        max-width: 360px;
        font-size: 18px;
        letter-spacing: 1px;
        padding: 16px 20px;
        border-radius: 18px;
    }
}

@media (max-width: 420px) {
    .hero-title {
        font-size: 26px;
    }

    .hero-subtitle {
        font-size: 15px;
    }

    .dusty-mount {
        width: min(82vw, 280px);
    }

    .speech-bubble {
        font-size: 15px;
        padding: 14px 14px;
    }

    .did-you-know-btn {
        font-size: 17px;
        padding: 15px 18px;
    }
}

@media (prefers-reduced-motion: reduce) {
    .dusty-widget,
    .dusty-base,
    .dusty-full,
    .dusty-part,
    .did-you-know-btn {
        animation: none !important;
        transition: none !important;
    }
}
</style>
</head>

<body>
<header class="nm-header">
    <div class="nm-header-inner">
        <div class="nm-brand">
            <div class="nm-state">
                <span class="nm-text">NM</span>
            </div>
            <span class="nm-year">26</span>
        </div>

        <nav class="nm-nav">
            <span>HOME</span>
            <span>PLANNER</span>
            <span>RESOURCES</span>
            <span>GUIDE</span>
        </nav>

        <div class="nm-login">
            <span>LOGIN</span>
        </div>
    </div>

    <div class="nm-stripe">
        VACATION 2026
    </div>
</header>

<main class="page-container">
    <section class="poster-hero">
        <p class="hero-kicker">Did You Know?</p>

        <h1 class="hero-title">
            Obsidian
        </h1>

        <p class="hero-subtitle">
            Press the button and hear a random fact about obsidian.
        </p>

        <div id="speechBubble" class="speech-bubble" aria-live="polite">
            Press the button and Dusty will share an obsidian fact.
        </div>

        <div class="traveler-stage">
            <div class="traveler-glow" aria-hidden="true"></div>
            <div id="dustyMount" class="dusty-mount"></div>
            <div class="traveler-shadow" aria-hidden="true"></div>
        </div>

        <div class="controls">
            <button id="didYouKnowBtn" class="did-you-know-btn" type="button">
                PRESS TO KNOW
            </button>
        </div>
    </section>
</main>

<script>
const facts = [
    "Obsidian forms when lava cools so fast that crystals don’t have time to grow. That means you’re looking at natural volcanic glass, frozen mid-eruption.",
    "Obsidian fractures with a conchoidal, shell-shaped break, creating razor-sharp edges. Modern surgeons have tested obsidian scalpels, and some edges are sharper than steel under a microscope.",
    "Valles Caldera obsidian was once a prehistoric super-commodity. Artifacts made from this exact volcanic glass have been found across the Great Plains, in the Mississippi Valley, and as far as Canada.",
    "Scientists can fingerprint obsidian chemically. A tiny sample can be traced back to a specific eruption zone on a specific lava dome within the Jemez Mountains.",
    "Indigenous knappers shaped obsidian into arrowheads, spear points, ritual blades, mirrors, and ceremonial objects. It was not only useful. It was sacred.",
    "Valles Caldera has multiple obsidian-bearing domes. Cerro del Medio is the most famous source, erupting repeatedly and resurfacing black glass deposits over about 1.2 million years.",
    "Obsidian is fragile under stress. Drop it, and it can shatter like glass. That is why ancient toolmakers often carried pieces wrapped in hides.",
    "Obsidian absorbs heat quickly. Leave a piece in the sun and you can feel the temperature rise fast.",
    "You are not allowed to collect obsidian inside the National Preserve. Legal local pieces are sold through approved rock shops.",
    "Some archaeologists think obsidian glints may have helped ancient travelers notice toolmaking areas from a distance.",
    "Obsidian edges can cut extremely deep. Even small shards can be dangerous."
];

const audioFiles = Array.from(
    { length: 11 },
    (_, index) => `assets/audio/obsidian${index + 1}.mp3`
);

const dustyPlacement = {
    hand: { width: 270, height: 285, top: 310, left: 270 },
    brow1: { width: 148, height: 84, top: 315, left: 730 },
    brow2: { width: 166, height: 99, top: 340, left: 905 }
};

const speechBubble = document.getElementById("speechBubble");
const button = document.getElementById("didYouKnowBtn");
const dustyMount = document.getElementById("dustyMount");

let currentAudio = null;
let lastPlayedIndex = -1;
let mouthTimer = null;
let blinkTimer = null;

function createDustyMarkup() {
    dustyMount.innerHTML = `
        <div class="dusty-widget" id="dustyWidget">
            <img
                id="dustyBase"
                class="dusty-base"
                src="assets/images/dusty_base.png"
                alt="Dusty"
            >
            <img
                id="dustyEyes"
                class="dusty-full dusty-eyes"
                src="assets/images/dusty_eyes_closed.png"
                alt=""
            >
            <img
                id="dustyMouth"
                class="dusty-full dusty-mouth"
                src="assets/images/dusty_mouth_closed.png"
                alt=""
            >
            <img
                id="dustyHand"
                class="dusty-part dusty-hand"
                src="assets/images/dusty_hand.png"
                alt=""
            >
            <img
                id="dustyBrow1"
                class="dusty-part dusty-brow-1"
                src="assets/images/dusty_brow_1.png"
                alt=""
            >
            <img
                id="dustyBrow2"
                class="dusty-part dusty-brow-2"
                src="assets/images/dusty_brow_2.png"
                alt=""
            >
        </div>
    `;
}

function waitForImage(img) {
    return new Promise((resolve, reject) => {
        if (img.complete && img.naturalWidth > 0) {
            resolve();
            return;
        }

        img.addEventListener("load", () => resolve(), { once: true });
        img.addEventListener("error", () => reject(new Error(`Failed to load ${img.src}`)), { once: true });
    });
}

function placePart(element, part, baseWidth, baseHeight) {
    element.style.width = `${(part.width / baseWidth) * 100}%`;
    element.style.left = `${(part.left / baseWidth) * 100}%`;
    element.style.top = `${(part.top / baseHeight) * 100}%`;
}

function positionDustyParts() {
    const dustyBase = document.getElementById("dustyBase");
    const dustyHand = document.getElementById("dustyHand");
    const dustyBrow1 = document.getElementById("dustyBrow1");
    const dustyBrow2 = document.getElementById("dustyBrow2");

    if (!dustyBase || !dustyBase.naturalWidth || !dustyBase.naturalHeight) {
        return;
    }

    const baseWidth = dustyBase.naturalWidth;
    const baseHeight = dustyBase.naturalHeight;

    placePart(dustyHand, dustyPlacement.hand, baseWidth, baseHeight);
    placePart(dustyBrow1, dustyPlacement.brow1, baseWidth, baseHeight);
    placePart(dustyBrow2, dustyPlacement.brow2, baseWidth, baseHeight);
}

function blinkOnce(duration = 150) {
    const dustyEyes = document.getElementById("dustyEyes");
    if (!dustyEyes) {
        return;
    }

    dustyEyes.style.opacity = "1";

    window.setTimeout(() => {
        dustyEyes.style.opacity = "0";
    }, duration);
}

function scheduleBlinkLoop() {
    window.clearTimeout(blinkTimer);

    const queueBlink = () => {
        const delay = 2600 + Math.random() * 2600;

        blinkTimer = window.setTimeout(() => {
            blinkOnce();
            queueBlink();
        }, delay);
    };

    queueBlink();
}

function lowerBrows() {
    const dustyBrow1 = document.getElementById("dustyBrow1");
    const dustyBrow2 = document.getElementById("dustyBrow2");

    dustyBrow1.classList.remove("lower");
    dustyBrow2.classList.remove("lower");

    void dustyBrow1.offsetWidth;
    void dustyBrow2.offsetWidth;

    dustyBrow1.classList.add("lower");
    dustyBrow2.classList.add("lower");
}

function startTalking() {
    const dustyWidget = document.getElementById("dustyWidget");
    const dustyMouth = document.getElementById("dustyMouth");

    stopTalking();
    dustyWidget.classList.add("is-speaking");

    mouthTimer = window.setInterval(() => {
        dustyMouth.style.opacity = dustyMouth.style.opacity === "1" ? "0" : "1";
    }, 170);
}

function stopTalking() {
    const dustyWidget = document.getElementById("dustyWidget");
    const dustyMouth = document.getElementById("dustyMouth");

    if (mouthTimer) {
        window.clearInterval(mouthTimer);
        mouthTimer = null;
    }

    if (dustyWidget) {
        dustyWidget.classList.remove("is-speaking");
    }

    if (dustyMouth) {
        dustyMouth.style.opacity = "1";
    }

    button.disabled = false;
}

function getRandomIndex() {
    if (audioFiles.length === 1) {
        return 0;
    }

    let nextIndex = lastPlayedIndex;

    while (nextIndex === lastPlayedIndex) {
        nextIndex = Math.floor(Math.random() * audioFiles.length);
    }

    return nextIndex;
}

function stopCurrentAudio() {
    if (!currentAudio) {
        stopTalking();
        return;
    }

    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
    stopTalking();
}

function playRandomFact() {
    stopCurrentAudio();

    const selectedIndex = getRandomIndex();
    const selectedFile = audioFiles[selectedIndex];
    const selectedFact = facts[selectedIndex] || "Did you know?";
    const audio = new Audio(selectedFile);

    currentAudio = audio;
    lastPlayedIndex = selectedIndex;
    speechBubble.textContent = selectedFact;
    button.disabled = true;

    audio.addEventListener("play", () => {
        startTalking();
        lowerBrows();
    });

    audio.addEventListener("ended", () => {
        stopTalking();
        speechBubble.textContent = "Press the button and Dusty will share another obsidian fact.";
        currentAudio = null;
    });

    audio.addEventListener("pause", () => {
        if (currentAudio === audio) {
            stopTalking();
        }
    });

    audio.addEventListener("error", () => {
        stopTalking();
        speechBubble.textContent = `I couldn't play ${selectedFile}. Check assets/audio/.`;
        currentAudio = null;
    });

    audio.play().catch(() => {
        stopTalking();
        speechBubble.textContent = `Playback failed for ${selectedFile}.`;
        currentAudio = null;
    });
}

async function initDusty() {
    createDustyMarkup();

    const dustyWidget = document.getElementById("dustyWidget");
    const dustyBase = document.getElementById("dustyBase");
    const dustyEyes = document.getElementById("dustyEyes");
    const dustyMouth = document.getElementById("dustyMouth");
    const dustyHand = document.getElementById("dustyHand");
    const dustyBrow1 = document.getElementById("dustyBrow1");
    const dustyBrow2 = document.getElementById("dustyBrow2");

    await Promise.all([
        waitForImage(dustyBase),
        waitForImage(dustyEyes),
        waitForImage(dustyMouth),
        waitForImage(dustyHand),
        waitForImage(dustyBrow1),
        waitForImage(dustyBrow2)
    ]);

    positionDustyParts();
    dustyMouth.style.opacity = "1";
    dustyWidget.classList.add("is-ready");

    window.addEventListener("resize", positionDustyParts);
    button.addEventListener("click", playRandomFact);

    scheduleBlinkLoop();
}

initDusty().catch((error) => {
    speechBubble.textContent = `Dusty could not load: ${error.message}`;
});
</script>
</body>
</html>
